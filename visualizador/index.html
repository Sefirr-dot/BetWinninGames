    </div>`;
}

// ── MATCH DETAIL MODAL ──
function openModal(idx) {
  const m = ALL_MATCHES[idx];
  if (!m) return;
  document.getElementById('modal-content').innerHTML = renderMatchModal(m);
  document.getElementById('match-modal').style.display = 'flex';
  document.body.style.overflow = 'hidden';
}
function closeModal() {
  document.getElementById('match-modal').style.display = 'none';
  document.body.style.overflow = '';
}
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

function renderMatchModal(m) {
  const _out = { home: 'Victoria Local', draw: 'Empate', away: 'Victoria Visitante' };
  const starsHtml = starsHTML(m.stars);
  const posStr = (m.homePos && m.awayPos) ? ` · <span class="pos-badge">${m.homePos}° vs ${m.awayPos}°</span>` : '';

  // Sub-model table
  let subTable = '';
  if (m.subModels && Object.keys(m.subModels).length) {
    const modelNames = { dc: 'Dixon-Coles', elo: 'Elo', form: 'Forma', h2h: 'H2H' };
    const modelWeights = { dc: '45%', elo: '20%', form: '20%', h2h: '5%' };
    const rows = Object.entries(m.subModels).map(([key, v]) => {
      return `<tr>
        <td style="font-weight:600">${modelNames[key] || key}</td>
        <td style="color:var(--muted);font-size:10px">${modelWeights[key] || ''}</td>
        <td style="color:#60a5fa">${v.p1}%</td>
        <td style="color:var(--muted)">${v.pX}%</td>
        <td style="color:#c084fc">${v.p2}%</td>
        <td class="model-bar-cell">
          <div class="model-bar-wrap">
            <div class="model-bar-1" style="width:${v.p1}%"></div>
            <div class="model-bar-x" style="width:${v.pX}%"></div>
            <div class="model-bar-2" style="width:${v.p2}%"></div>
          </div>
        </td>
      </tr>`;
    }).join('');
    subTable = `
      <div class="modal-section">
        <div class="modal-section-title">Desglose por sub-modelo</div>
        <table class="model-table">
          <thead><tr><th>Modelo</th><th>Peso</th><th style="color:#60a5fa">Local</th><th>Empate</th><th style="color:#c084fc">Visit.</th><th>Dist.</th></tr></thead>
          <tbody>${rows}</tbody>
        </table>
      </div>`;
  }

  // Elo ratings
  let eloSection = '';
  if (m.eloHome && m.eloAway) {
    const diff = m.eloHome - m.eloAway;
    const diffStr = diff > 0 ? `+${diff}` : `${diff}`;
    eloSection = `
      <div class="modal-section">
        <div class="modal-section-title">Ratings Elo</div>
        <div class="modal-stat-row">
          <div class="modal-stat-chip"><div class="sv" style="color:var(--home)">${m.eloHome}</div><div class="sl">${m.homeShort}</div></div>
          <div class="modal-stat-chip"><div class="sv" style="color:${diff>0?'var(--accent-green)':'var(--pd)'}">${diffStr}</div><div class="sl">Diferencia</div></div>
          <div class="modal-stat-chip"><div class="sv" style="color:var(--away)">${m.eloAway}</div><div class="sl">${m.awayShort}</div></div>
        </div>
      </div>`;
  }

  // Fatigue + Stats
  const fatHome = m.fatigueHome !== null && m.fatigueHome !== undefined ? `${m.fatigueHome}d` : '—';
  const fatAway = m.fatigueAway !== null && m.fatigueAway !== undefined ? `${m.fatigueAway}d` : '—';
  const fatColorH = m.fatigueHome < 4 ? 'var(--pd)' : m.fatigueHome < 7 ? 'var(--accent-yellow)' : 'var(--accent-green)';
  const fatColorA = m.fatigueAway < 4 ? 'var(--pd)' : m.fatigueAway < 7 ? 'var(--accent-yellow)' : 'var(--accent-green)';

  const statsSection = `
    <div class="modal-section">
      <div class="modal-section-title">Stats del partido</div>
      <div class="modal-stat-row">
        <div class="modal-stat-chip"><div class="sv ${m.over25yn?'':''}"><span class="stat-yn ${m.over25yn?'yn-yes':'yn-no'}" style="font-size:14px">${m.over25yn?'SI':'NO'}</span></div><div class="sl">Over 2.5 (${m.over25}%)</div></div>
        <div class="modal-stat-chip"><div class="sv"><span class="stat-yn ${m.bttsyn?'yn-yes':'yn-no'}" style="font-size:14px">${m.bttsyn?'SI':'NO'}</span></div><div class="sl">BTTS (${m.btts}%)</div></div>
        <div class="modal-stat-chip"><div class="sv">${m.corners !== null ? m.corners : '—'}</div><div class="sl">Córners esp.</div></div>
        ${m.cards !== null ? `<div class="modal-stat-chip"><div class="sv" style="color:var(--accent-orange)">${m.cardsHome}+${m.cardsAway}</div><div class="sl">Tarjetas esp. (${m.cards} tot.)</div></div>` : ''}
        ${m.goalsHome !== null ? `<div class="modal-stat-chip"><div class="sv"><span style="color:var(--home)">${m.goalsHome}</span><span style="color:var(--muted);font-size:14px">-</span><span style="color:var(--away)">${m.goalsAway}</span></div><div class="sl">Goles esp.</div></div>` : ''}
      </div>
      <div class="modal-stat-row" style="margin-top:8px">
        <div class="modal-stat-chip"><div class="sv" style="color:${fatColorH}">${fatHome}</div><div class="sl">Descanso ${m.homeShort}</div></div>
        <div class="modal-stat-chip"><div class="sv" style="color:${fatColorA}">${fatAway}</div><div class="sl">Descanso ${m.awayShort}</div></div>
        ${m.bestScore ? `<div class="modal-stat-chip"><div class="sv" style="color:var(--accent-gold)">${m.bestScore}</div><div class="sl">Score más probable (${m.bestScoreProb}%)</div></div>` : ''}
        ${m.eloConf !== null ? `<div class="modal-stat-chip"><div class="sv">${m.eloConf}%</div><div class="sl">Conf. Elo</div></div>` : ''}
      </div>
    </div>`;

  // Score distribution grid (from Dixon-Coles prob_matrix)
  let scoreGridSection = '';
  if (m.scoreGrid && m.scoreGrid.length > 0) {
    const grid = m.scoreGrid;
    const maxP = Math.max(...grid.flat());
    const awayGoals = grid[0].length;
    const homeGoals = grid.length;
    const headerCells = '<th></th>' + Array.from({length: awayGoals}, (_, i) => `<th style="color:var(--away)">${i}</th>`).join('');
    const bodyRows = grid.map((row, h) => {
      const cells = row.map((p, a) => {
        const intensity = maxP > 0 ? p / maxP : 0;
        const isBest = m.bestScore === `${h}-${a}`;
        const bg = `rgba(20,184,166,${(intensity * 0.85).toFixed(2)})`;
        const border = isBest ? '2px solid var(--accent-gold)' : '1px solid transparent';
        const textColor = intensity > 0.5 ? '#fff' : 'var(--text)';
        return `<td style="background:${bg};border:${border};color:${textColor};font-weight:${isBest?'700':'400'}">${p.toFixed(1)}%</td>`;
      }).join('');
      return `<tr><th style="color:var(--home)">${h}</th>${cells}</tr>`;
    }).join('');
    scoreGridSection = `
      <div class="modal-section">
        <div class="modal-section-title">Distribución de marcadores</div>
        <div style="font-size:11px;color:var(--muted);margin-bottom:8px">Goles local (eje Y) × Goles visitante (eje X) — probabilidad %</div>
        <div style="overflow-x:auto">
          <table class="score-grid-table">
            <thead><tr>${headerCells}</tr></thead>
            <tbody>${bodyRows}</tbody>
          </table>
        </div>
      </div>`;
  }

  // H2H + form
  let h2hSection = '';
  if (m.h2h) {
    h2hSection = `<div class="modal-section"><div class="modal-section-title">Head to Head</div><div style="font-size:13px;color:var(--text)">${m.h2h}</div></div>`;
  }

  // Value bets
  let vbSection = '';
  if (m.valueBets && m.valueBets.length) {
    const _outL = { home: 'Local', draw: 'Empate', away: 'Visitante' };
    const vbRows = m.valueBets.map(vb =>
      `<div style="display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid var(--border)">
        <div>
          <span style="font-weight:600;font-size:13px">${_outL[vb.outcome]||vb.outcome}</span>
          <span class="vb-edge-badge" style="margin-left:8px">Edge +${vb.edge}%</span>
          <span class="vb-kelly-badge" style="margin-left:4px">Kelly ${vb.kelly}%</span>
        </div>
        <div style="text-align:right">
          <div style="font-family:'Barlow Condensed',sans-serif;font-size:20px;font-weight:800">@${vb.bkOdds}</div>
          <div style="font-size:10px;color:var(--muted)">Modelo ${vb.modelProb}% vs Impl. ${vb.impliedProb}%</div>
        </div>
      </div>`
    ).join('');
    vbSection = `<div class="modal-section"><div class="modal-section-title">💎 Value Bets</div>${vbRows}</div>`;
  }

  const winner = winnerTeam(m);
  const isHome = winner === 'home', isAway = winner === 'away';
  const total = m.prob1 + m.probX + m.prob2;
  const w1 = (m.prob1/total*100).toFixed(1), wX = (m.probX/total*100).toFixed(1), w2 = (m.prob2/total*100).toFixed(1);

  return `
    <div class="modal-header">
      <div class="modal-teams">${m.home} <span style="color:var(--muted);font-weight:400">vs</span> ${m.away}</div>
      <div class="modal-meta">
        <span class="league-badge badge-${m.league}">${m.league}</span>
        ${m.time ? `<span class="time-chip">🕐 ${m.time}</span>` : ''}
        <span class="stars-row stars-${m.stars}" style="font-size:14px">${starsHtml}</span>
        ${m.homePos && m.awayPos ? `<span class="pos-badge">${m.homePos}° vs ${m.awayPos}°</span>` : ''}
      </div>
    </div>
    <div class="modal-section">
      <div class="modal-section-title">Predicción del ensemble</div>
      <div class="prob-bar" style="height:32px">
        <div class="prob-seg seg-1 ${isHome?'winner':''}" style="width:${w1}%">${m.prob1 > 12 ? m.prob1+'%' : ''}</div>
        <div class="prob-seg seg-x" style="width:${wX}%">${m.probX > 10 ? m.probX+'%' : ''}</div>
        <div class="prob-seg seg-2 ${isAway?'winner':''}" style="width:${w2}%">${m.prob2 > 12 ? m.prob2+'%' : ''}</div>
      </div>
      <div class="prob-values" style="margin-top:6px">
        <span class="prob-val-1 ${isHome?'winner':''}">${m.homeShort} ${m.prob1}%</span>
        <span class="prob-val-x">Empate ${m.probX}%</span>
        <span class="prob-val-2 ${isAway?'winner':''}">${m.awayShort} ${m.prob2}%</span>
      </div>
      ${m.fairOdds ? `<div style="margin-top:8px;font-size:12px;color:var(--muted)">Cuota justa: <span style="color:var(--accent-gold);font-weight:700">@${m.fairOdds}</span>${m.marketOdds?` · Mercado: <span style="font-weight:700">@${m.marketOdds}</span>`:''}</div>` : ''}
    </div>
    ${subTable}
    ${eloSection}
    ${statsSection}
    ${scoreGridSection}
    ${h2hSection}
    ${vbSection}`;
}

// ── RELIABILITY DIAGRAM ──
function renderReliabilityDiagram(picks) {
  const resolved = picks.filter(p => p.actualResult !== null);
  if (resolved.length < 20) {
    return `<div style="text-align:center;color:var(--muted);font-size:13px;padding:20px">Se necesitan ≥20 picks resueltos (actuales: ${resolved.length}).</div>`;
  }
  // 10 buckets: 0-9%, 10-19%, ..., 90-100%
  const buckets = Array.from({length: 10}, (_, i) => ({ min: i*10, max: (i+1)*10, sumPred: 0, sumActual: 0, n: 0 }));
  resolved.forEach(p => {
    const idx = Math.min(9, Math.floor(p.bestProb / 10));
    buckets[idx].sumPred   += p.bestProb;
    buckets[idx].sumActual += p.actualResult === p.bestOutcome ? 1 : 0;
    buckets[idx].n++;
  });

  const W = 480, H = 240;
  const PAD = { top: 20, right: 20, bottom: 36, left: 44 };
  const iW = W - PAD.left - PAD.right, iH = H - PAD.top - PAD.bottom;
  const xS = pct => PAD.left + (pct / 100) * iW;
  const yS = pct => PAD.top + iH - (pct / 100) * iH;

  // Perfect calibration diagonal
  const diag = `M ${xS(0)},${yS(0)} L ${xS(100)},${yS(100)}`;

  // Bars per bucket
  const barW = iW / 10 - 2;
  const bars = buckets.map((b, i) => {
    if (!b.n) return '';
    const actualRate = (b.sumActual / b.n) * 100;
    const midX = xS(b.min + 5) - barW/2;
    const barH = (actualRate / 100) * iH;
    const color = actualRate >= b.min && actualRate <= b.max + 10 ? 'var(--accent-teal)' : 'var(--accent-gold)';
    return `<rect x="${midX.toFixed(1)}" y="${(PAD.top + iH - barH).toFixed(1)}" width="${barW.toFixed(1)}" height="${barH.toFixed(1)}" fill="${color}" opacity="0.7" rx="2"/>
            <text x="${(midX + barW/2).toFixed(1)}" y="${H - 8}" text-anchor="middle" font-size="9" fill="var(--muted)">${b.min+5}%</text>`;
  }).join('');

  // Dots at actual rates
  const dots = buckets.map(b => {
    if (!b.n) return '';
    const cx = xS(b.min + 5), cy = yS((b.sumActual / b.n) * 100);
    return `<circle cx="${cx.toFixed(1)}" cy="${cy.toFixed(1)}" r="4" fill="var(--accent-gold)" stroke="var(--surface)" stroke-width="1.5"/>`;
  }).join('');

  // Y axis labels
  const yLabels = [0,25,50,75,100].map(v =>
    `<text x="${PAD.left - 4}" y="${yS(v) + 3}" text-anchor="end" font-size="9" fill="var(--muted)">${v}%</text>
     <line x1="${PAD.left}" y1="${yS(v)}" x2="${W - PAD.right}" y2="${yS(v)}" stroke="var(--border)" stroke-width="0.5"/>`
  ).join('');

  return `<svg viewBox="0 0 ${W} ${H}" style="width:100%;height:auto;display:block">
    ${yLabels}
    <path d="${diag}" stroke="rgba(255,255,255,0.15)" stroke-width="1" stroke-dasharray="4,3" fill="none"/>
    ${bars}
    ${dots}
    <text x="${W/2}" y="${H - 0}" text-anchor="middle" font-size="10" fill="var(--muted)">Probabilidad predicha</text>
    <text x="10" y="${H/2}" text-anchor="middle" font-size="10" fill="var(--muted)" transform="rotate(-90,10,${H/2})">Tasa real</text>
  </svg>`;
}

// ── INIT ──
document.getElementById('sort-select').addEventListener('change', render);
render();
